<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Übersicht des Southside-Festival-Timetables." />
  <title>Southside Timetable</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo" aria-hidden="true">SS</div>
    <h1>Southside Timetable</h1>
    <p class="subtitle" id="festival-meta"></p>
    <a class="jump-personal" href="#personal">
      <span aria-hidden="true">✨</span> Personal Timetable erstellen
    </a>
  </header>

  <main>
    <nav class="day-nav" id="day-nav" aria-label="Festivaltage"></nav>
    <nav class="stage-nav" id="stage-nav" aria-label="Stages"></nav>
    <div class="search-bar">
      <input
        type="search"
        id="band-search"
        class="band-search"
        placeholder="Band suchen …"
        aria-label="Nach Bandnamen suchen"
        autocomplete="off"
      />
      <button
        type="button"
        id="search-clear"
        class="search-clear"
        aria-label="Suche löschen"
        hidden
      >
        ×
      </button>
    </div>
    <section class="schedule" id="schedule" aria-live="polite"></section>

    <section class="personal" id="personal" aria-labelledby="personal-title">
      <h2 id="personal-title">Personal Timetable</h2>
      <p class="personal-intro">
        Wähle deine Genres und lass dir einen persönlichen, überschneidungsfreien
        Timetable zusammenstellen.
      </p>
      <div class="genre-tags" id="genre-tags" role="group" aria-label="Genres"></div>
      <button class="generate-btn" id="generate-btn" type="button">
        Generate personal timetable
      </button>
      <p class="personal-status" id="personal-status" aria-live="polite"></p>
      <div class="personal-result" id="personal-result"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p id="source-note"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
